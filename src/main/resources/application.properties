# ?????????????????????????????????????????????????????????????????????
#StayNexus - Application Configuration
#
# Values wrapped in ${...} are read from environment variables.
# Set them either in your .env file or in IntelliJ run configuration.
# ?????????????????????????????????????????????????????????????????????

# ????? Application ????????????????????????????????????????????????????????????????
spring.application.name=StayNexus

# ???? Server ?????????????????????????????????????????????????????????????????
# Your API will be available at: http://localhost:8080/api/v1/...
server.port=8080
server.servlet.context-path=/api/v1

# ?????? Database ??????????????????????????????????????????????????????????????
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# ??????? Hibernate/JPA ??????????????????????????????????????????????????????????????
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ????????? JWT ????????????????????????????????????????????????????????????
jwt.secretKey=${JWT_SECRET}

# ????????? Stripe ???????????????????????????????????????????????????????????
stripe.secret.key=${STRIPE_SECRET_KEY}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET}

# ?????????? Frontend ???????????????????????????????????????????????????????????
frontend.url=${FRONTEND_URL}

# ?????????? Swagger/OpenAPI ???????????????????????????????????????????????????????????
#Visit: http://localhost:8080/api/v1/swagger-ui/index.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
#Allow swagger through Spring Security (we permit it in WebSecurityConfig too)
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
